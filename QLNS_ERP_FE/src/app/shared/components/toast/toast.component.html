<!-- src/app/shared/components/toast/toast.component.html -->

<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;">
    <div *ngFor="let toast of toasts; trackBy: trackById" class="toast show" [ngClass]="getBgClass(toast.type)"
        role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header" [ngClass]="getBgClass(toast.type)">
            <i class="bi me-2" [ngClass]="getIcon(toast.type)"></i>
            <strong class="me-auto">Thông báo</strong>
            <button type="button" class="btn-close btn-close-white" aria-label="Close"
                (click)="remove(toast.id)"></button>
        </div>
        <div class="toast-body">
            {{ toast.message }}
        </div>
    </div>
</div>
