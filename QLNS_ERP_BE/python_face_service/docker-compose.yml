version: '3.8'

services:
  insightface:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insightface_python_service
    ports:
      - "5000:5000"
    volumes:
      # Mount model cache để không phải download lại mỗi lần restart
      - insightface_models:/root/.insightface
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  insightface_models:
    driver: local
